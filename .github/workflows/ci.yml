name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.11.0

      - name: Scaffold tests
        run: bash infra/scripts/tests/phase0-structure.sh && bash infra/scripts/tests/bootstrap-scripts.sh && bash infra/scripts/tests/phase1-compose.sh && bash infra/scripts/tests/stage9-routing.sh && bash infra/scripts/tests/stage10-policy.sh && bash infra/scripts/tests/stage11-search.sh && bash infra/scripts/tests/stage12-content.sh && bash infra/scripts/tests/secrets-hygiene.sh && bash infra/scripts/tests/env-loader-safety.sh && bash infra/scripts/tests/scope-accuracy.sh && bash infra/scripts/tests/hardening-baseline.sh && bash infra/scripts/tests/backup-restore-guards.sh && bash infra/scripts/tests/restore-live-guards.sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: Dependency audit
        run: bash infra/scripts/tests/dependency-audit.sh

      - name: Validate compose
        run: docker compose --env-file .env.example -f infra/compose/docker-compose.yml config > /dev/null

      - name: Container build validation
        run: bash infra/scripts/tests/container-build-validation.sh
