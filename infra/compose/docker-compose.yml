name: schwass_secure_file_lab

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - '${CADDY_HTTP_PORT:-8080}:80'
      - '${CADDY_HTTPS_PORT:-8443}:443'
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      realtime:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'caddy', 'version']
      interval: 15s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-07T23-21-09Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 10

  minio_init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    profiles: ['bootstrap']
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ['/bin/sh', '/scripts/minio-init.sh']
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - ../scripts:/scripts:ro
    networks:
      - app_net

  vault:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    volumes:
      - vault_data:/vault/file
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'VAULT_ADDR=http://127.0.0.1:8200 vault status >/dev/null 2>&1']
      interval: 10s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost 3310']
      interval: 20s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - '${MAILHOG_UI_PORT:-8025}:8025'
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8025']
      interval: 15s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.5
    profiles: ['enterprise']
    restart: unless-stopped
    command: ['start-dev', '--http-enabled=true', '--http-port=8080', '--hostname-strict=false']
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: 'true'
    ports:
      - '${KEYCLOAK_HTTP_PORT:-8081}:8080'
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health/ready >/dev/null']
      interval: 20s
      timeout: 5s
      retries: 20

  opa:
    image: openpolicyagent/opa:0.64.0-static
    profiles: ['enterprise']
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policy
    volumes:
      - ../opa:/policy:ro
    ports:
      - '${OPA_HTTP_PORT:-8181}:8181'
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8181/health >/dev/null']
      interval: 20s
      timeout: 5s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    profiles: ['search']
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '${OPENSEARCH_HTTP_PORT:-9200}:9200'
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9200 >/dev/null']
      interval: 20s
      timeout: 5s
      retries: 20

  opensearch_dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    profiles: ['search']
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports:
      - '${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601'
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5601 >/dev/null']
      interval: 20s
      timeout: 5s
      retries: 20

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../../apps/web:/usr/share/nginx/html:ro
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost']
      interval: 15s
      timeout: 5s
      retries: 5

  admin:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../../apps/admin:/usr/share/nginx/html:ro
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost']
      interval: 15s
      timeout: 5s
      retries: 5

  realtime:
    image: node:22-alpine
    restart: unless-stopped
    user: 'node'
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777,uid=1000,gid=1000
    command: ['node', '/app/server.mjs']
    environment:
      REALTIME_PORT: ${REALTIME_PORT:-3010}
    volumes:
      - ../../apps/realtime/server.mjs:/app/server.mjs:ro
    networks:
      - app_net
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:3010/health/live").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));'
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - ../../.env
    environment:
      API_PORT: ${API_PORT}
      NODE_ENV: ${NODE_ENV}
      COREPACK_HOME: /tmp/corepack
      FILE_SCAN_JOB_ATTEMPTS: ${FILE_SCAN_JOB_ATTEMPTS:-3}
      POLICY_ENGINE_ENABLED: ${POLICY_ENGINE_ENABLED:-false}
      POLICY_ENGINE_FAIL_SAFE_DENY: ${POLICY_ENGINE_FAIL_SAFE_DENY:-true}
      POLICY_ENGINE_TIMEOUT_MS: ${POLICY_ENGINE_TIMEOUT_MS:-3000}
      OPA_BASE_URL: ${OPA_BASE_URL:-http://opa:8181}
      OPA_POLICY_PATH: ${OPA_POLICY_PATH:-/v1/data/schwass/allow}
      KEYCLOAK_SSO_ENABLED: ${KEYCLOAK_SSO_ENABLED:-false}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-master}
      KEYCLOAK_TIMEOUT_MS: ${KEYCLOAK_TIMEOUT_MS:-5000}
      OPENSEARCH_ENABLED: ${OPENSEARCH_ENABLED:-false}
      OPENSEARCH_BASE_URL: ${OPENSEARCH_BASE_URL:-http://opensearch:9200}
      OPENSEARCH_FILES_INDEX: ${OPENSEARCH_FILES_INDEX:-files-v1}
      OPENSEARCH_FAIL_SAFE_DB_FALLBACK: ${OPENSEARCH_FAIL_SAFE_DB_FALLBACK:-true}
      SEARCH_INDEX_JOB_ATTEMPTS: ${SEARCH_INDEX_JOB_ATTEMPTS:-3}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      VAULT_HOST: ${VAULT_HOST}
      VAULT_PORT: ${VAULT_PORT}
      CLAMAV_HOST: ${CLAMAV_HOST}
      CLAMAV_PORT: ${CLAMAV_PORT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - app_net
    user: 'node'
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777,uid=1000,gid=1000
      - /workspace/node_modules/.vite-temp:rw,nosuid,nodev,mode=1777,uid=1000,gid=1000
      - /workspace/apps/api/node_modules/.vite-temp:rw,nosuid,nodev,mode=1777,uid=1000,gid=1000
      - /workspace/packages/shared/node_modules/.vite-temp:rw,nosuid,nodev,mode=1777,uid=1000,gid=1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:3000/v1/health/live").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));'
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - ../../.env
    environment:
      NODE_ENV: ${NODE_ENV}
      COREPACK_HOME: /tmp/corepack
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT}
      WORKER_SCAN_CONCURRENCY: ${WORKER_SCAN_CONCURRENCY:-2}
      WORKER_EXPIRE_SWEEP_MS: ${WORKER_EXPIRE_SWEEP_MS:-60000}
      WORKER_CLEANUP_SWEEP_MS: ${WORKER_CLEANUP_SWEEP_MS:-300000}
      FILE_SCAN_JOB_ATTEMPTS: ${FILE_SCAN_JOB_ATTEMPTS:-3}
      FILE_EXPIRED_RETENTION_SECONDS: ${FILE_EXPIRED_RETENTION_SECONDS:-86400}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CLAMAV_HOST: ${CLAMAV_HOST}
      CLAMAV_PORT: ${CLAMAV_PORT}
      VAULT_HOST: ${VAULT_HOST}
      VAULT_PORT: ${VAULT_PORT}
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TRANSIT_KEY_NAME: ${VAULT_TRANSIT_KEY_NAME}
      OPENSEARCH_ENABLED: ${OPENSEARCH_ENABLED:-false}
      OPENSEARCH_BASE_URL: ${OPENSEARCH_BASE_URL:-http://opensearch:9200}
      OPENSEARCH_FILES_INDEX: ${OPENSEARCH_FILES_INDEX:-files-v1}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
      vault:
        condition: service_healthy
    networks:
      - app_net
    user: 'node'
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,mode=1777,uid=1000,gid=1000
      - /workspace/node_modules/.vite-temp:rw,nosuid,nodev,mode=1777,uid=1000,gid=1000
      - /workspace/apps/worker/node_modules/.vite-temp:rw,nosuid,nodev,mode=1777,uid=1000,gid=1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:3001/v1/health/live").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));'
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  backup:
    image: alpine:3.20
    restart: unless-stopped
    command: ['sh', '-c', 'while true; do sleep 3600; done']
    volumes:
      - ../../backups:/backups
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'sh', '-c', 'test -d /backups']
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  app_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
  vault_data:
  clamav_data:
