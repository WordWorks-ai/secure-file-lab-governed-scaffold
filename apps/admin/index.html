<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
<meta name="referrer" content="no-referrer">
<title>Secure File Lab Admin</title>
<style>
:root {
  color-scheme: light;
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --dim: #64748b;
  --accent: #1e3a5f;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #d97706;
  --orange: #d97706;
  --font-body: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }
body { display: flex; flex-direction: column; }

/* Top bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; background: var(--accent);
  color: #ffffff; flex-shrink: 0;
}
.topbar-brand { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; }
.topbar-user { font-size: 13px; opacity: 0.85; }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.tab-bar button {
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  padding: 10px 24px; border: none; background: none; color: var(--dim);
  cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s;
}
.tab-bar button:hover { color: var(--text); }
.tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Main content */
.main { flex: 1; overflow-y: auto; padding: 24px; }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px; margin-bottom: 16px;
}
.card-title {
  font-size: 14px; font-weight: 700; margin-bottom: 12px;
  color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em;
}

/* Forms */
.filter-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.filter-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600; color: var(--dim); }
.filter-grid input, .filter-grid select {
  font-family: var(--font-body); font-size: 13px; padding: 6px 10px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); color: var(--text);
}
.filter-grid input:focus, .filter-grid select:focus { outline: none; border-color: var(--accent); }

/* Buttons */
.btn {
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; background: var(--surface); color: var(--text);
  transition: border-color 0.15s, opacity 0.15s;
}
.btn:hover { border-color: var(--accent); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #ffffff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { opacity: 0.85; }
.btn-sm { font-size: 11px; padding: 4px 10px; }
.btn-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

/* Tables */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em; color: var(--dim);
  border-bottom: 2px solid var(--border); background: var(--bg);
}
.tbl td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.tbl tr:hover td { background: var(--bg); }
.tbl .expand-btn {
  cursor: pointer; background: none; border: none; font-size: 12px;
  color: var(--dim); padding: 0 4px;
}
.tbl .expand-btn:hover { color: var(--accent); }

/* Detail row */
.detail-row td { padding: 12px; background: var(--bg); }
.detail-grid {
  display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px;
  font-size: 12px;
}
.detail-grid dt { font-weight: 600; color: var(--dim); }
.detail-grid dd { font-family: var(--font-mono); font-size: 12px; word-break: break-all; }

/* Pre blocks */
.pre-block {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 12px; font-family: var(--font-mono); font-size: 12px;
  overflow: auto; max-height: 500px; white-space: pre-wrap; word-break: break-word;
}

/* Status indicators */
.status-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}
.status-dot.ok { background: var(--green); }
.status-dot.err { background: var(--red); }
.status-dot.pending { background: var(--yellow); }

/* Diagnostics grid */
.diag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 860px) { .diag-grid { grid-template-columns: 1fr; } }
.diag-full { grid-column: 1 / -1; }

/* KV table */
.kv-table { width: 100%; font-size: 13px; border-collapse: collapse; }
.kv-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.kv-table td:first-child { font-weight: 600; color: var(--dim); width: 180px; white-space: nowrap; }
.kv-table td:last-child { font-family: var(--font-mono); font-size: 12px; word-break: break-all; }

/* Access denied */
.denied-wrap {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; padding: 20px;
}
.denied-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 40px; text-align: center;
  max-width: 420px; box-shadow: 0 4px 20px rgb(0 0 0 / 0.06);
}
.denied-card h1 { font-size: 20px; margin-bottom: 8px; color: var(--red); }
.denied-card p { color: var(--dim); margin-bottom: 20px; }
.denied-card a { color: var(--accent); text-decoration: none; font-weight: 600; }
.denied-card a:hover { text-decoration: underline; }

/* Result toolbar */
.result-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.result-toolbar span { font-size: 12px; color: var(--dim); }

/* Hide panels */
.panel { display: none; }
.panel.active { display: block; }

/* Scrollable container */
.scroll-y { overflow-y: auto; }
</style>
</head>
<body>

<!-- Access Denied view -->
<div id="denied-view" class="denied-wrap" style="display:none">
  <div class="denied-card">
    <h1>Access Denied</h1>
    <p>You must be an administrator to access this console.</p>
    <a href="/">Return to Secure File Lab</a>
  </div>
</div>

<!-- Authenticated admin shell -->
<div id="admin-shell" style="display:none">
  <div class="topbar">
    <span class="topbar-brand">Admin Console</span>
    <span class="topbar-user" id="user-indicator"></span>
  </div>

  <div class="tab-bar" id="tab-bar">
    <button class="active" data-tab="audit">Audit Explorer</button>
    <button data-tab="diagnostics">Diagnostics</button>
  </div>

  <div class="main">
    <!-- Audit Explorer Panel -->
    <div id="panel-audit" class="panel active">
      <div class="card">
        <div class="card-title">Filters</div>
        <div class="filter-grid">
          <label>orgId
            <input type="text" id="f-orgId">
          </label>
          <label>actorType
            <select id="f-actorType">
              <option value="">--</option>
              <option value="user">user</option>
              <option value="system">system</option>
              <option value="share_link">share_link</option>
            </select>
          </label>
          <label>action
            <input type="text" id="f-action" placeholder="auth.login">
          </label>
          <label>resourceType
            <input type="text" id="f-resourceType" placeholder="auth_session">
          </label>
          <label>resourceId
            <input type="text" id="f-resourceId" placeholder="uuid">
          </label>
          <label>result
            <select id="f-result">
              <option value="">--</option>
              <option value="success">success</option>
              <option value="failure">failure</option>
              <option value="denied">denied</option>
            </select>
          </label>
          <label>from
            <input type="datetime-local" id="f-from">
          </label>
          <label>to
            <input type="datetime-local" id="f-to">
          </label>
          <label>limit
            <input type="number" id="f-limit" placeholder="50">
          </label>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" id="btn-list-events">List Events</button>
          <button class="btn" id="btn-export">Export NDJSON</button>
          <span style="display:flex;align-items:center;gap:4px">
            <button class="btn" id="btn-summary">Summary</button>
            <input type="number" id="f-top" placeholder="5" style="width:60px;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg)">
          </span>
          <span style="display:flex;align-items:center;gap:4px">
            <button class="btn" id="btn-timeseries">Timeseries</button>
            <select id="f-bucket" style="font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg)">
              <option value="hour">hour</option>
              <option value="day">day</option>
            </select>
          </span>
          <span style="display:flex;align-items:center;gap:4px">
            <button class="btn" id="btn-kpis">KPIs</button>
            <input type="number" id="f-windowHours" placeholder="24" style="width:60px;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg)">
          </span>
        </div>
      </div>

      <div id="audit-results" style="display:none">
        <div class="result-toolbar">
          <span id="result-info"></span>
          <button class="btn btn-sm" id="btn-copy-results">Copy</button>
        </div>
        <div id="result-container"></div>
      </div>
    </div>

    <!-- Diagnostics Panel -->
    <div id="panel-diagnostics" class="panel">
      <div class="diag-grid">
        <div class="card">
          <div class="card-title">Health Status</div>
          <div id="health-content">
            <p style="color:var(--dim);font-size:13px">Loading...</p>
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-sm" id="btn-refresh-health">Refresh</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">System Info</div>
          <div id="sysinfo-content">
            <p style="color:var(--dim);font-size:13px">Loading...</p>
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-sm" id="btn-refresh-sysinfo">Refresh</button>
          </div>
        </div>

        <div class="card diag-full">
          <div class="card-title">Metrics</div>
          <div id="metrics-content">
            <p style="color:var(--dim);font-size:13px">Loading...</p>
          </div>
          <div style="margin-top:12px">
            <button class="btn btn-sm" id="btn-refresh-metrics">Refresh</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── Security Utilities ─────────────────────────── */

  function esc(s) {
    if (typeof s !== 'string') s = String(s == null ? '' : s);
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function safeMime(m) {
    if (typeof m !== 'string') return 'application/octet-stream';
    var re = /^[a-zA-Z0-9][a-zA-Z0-9!#$&\-^_.+]*\/[a-zA-Z0-9][a-zA-Z0-9!#$&\-^_.+]*$/;
    return re.test(m) ? m : 'application/octet-stream';
  }

  function redactHeaders(headers) {
    var out = {};
    if (!headers || typeof headers !== 'object') return out;
    for (var k in headers) {
      if (!headers.hasOwnProperty(k)) continue;
      if (k.toLowerCase() === 'authorization') {
        var v = String(headers[k]);
        out[k] = v.substring(0, 12) + '***REDACTED***';
      } else {
        out[k] = headers[k];
      }
    }
    return out;
  }

  /* ── Auth Gate ──────────────────────────────────── */

  var token = null;

  function extractToken() {
    var hash = location.hash || '';
    var match = hash.match(/token=([^&]+)/);
    if (match) return match[1];
    return null;
  }

  token = extractToken();
  history.replaceState(null, '', location.pathname);

  async function checkAdmin() {
    if (!token) { showDenied(); return; }
    try {
      var resp = await fetch('/v1/auth/admin-check', {
        method: 'GET',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!resp.ok) { showDenied(); return; }
      var data = await resp.json();
      showAdmin(data);
    } catch (e) {
      showDenied();
    }
  }

  function showDenied() {
    document.getElementById('denied-view').style.display = '';
    document.getElementById('admin-shell').style.display = 'none';
  }

  function showAdmin(data) {
    document.getElementById('denied-view').style.display = 'none';
    document.getElementById('admin-shell').style.display = 'flex';
    document.getElementById('admin-shell').style.flexDirection = 'column';
    document.getElementById('admin-shell').style.height = '100%';
    var userEl = document.getElementById('user-indicator');
    if (data && data.email) {
      userEl.textContent = data.email;
    } else if (data && data.sub) {
      userEl.textContent = data.sub;
    } else {
      userEl.textContent = 'admin';
    }
    loadDiagnostics();
  }

  /* ── API Client ─────────────────────────────────── */

  async function api(method, path, query) {
    var url = '/v1/' + path;
    if (query) {
      var params = new URLSearchParams();
      for (var k in query) {
        if (query[k] !== '' && query[k] !== undefined && query[k] !== null) params.set(k, String(query[k]));
      }
      var qs = params.toString();
      if (qs) url += '?' + qs;
    }
    var headers = {};
    if (token) headers['Authorization'] = 'Bearer ' + token;
    var resp = await fetch(url, { method: method, headers: headers });
    var ct = resp.headers.get('content-type') || '';
    var data;
    if (ct.indexOf('json') !== -1) {
      data = await resp.json();
    } else {
      data = await resp.text();
    }
    return { status: resp.status, ok: resp.ok, data: data };
  }

  /* ── Tab Switching ──────────────────────────────── */

  var tabButtons = document.querySelectorAll('#tab-bar button');
  tabButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var tabName = btn.getAttribute('data-tab');
      tabButtons.forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
      document.getElementById('panel-' + tabName).classList.add('active');
      if (tabName === 'diagnostics') loadDiagnostics();
    });
  });

  /* ── Audit Explorer ─────────────────────────────── */

  function getFilters() {
    return {
      orgId: document.getElementById('f-orgId').value,
      actorType: document.getElementById('f-actorType').value,
      action: document.getElementById('f-action').value,
      resourceType: document.getElementById('f-resourceType').value,
      resourceId: document.getElementById('f-resourceId').value,
      result: document.getElementById('f-result').value,
      from: document.getElementById('f-from').value,
      to: document.getElementById('f-to').value,
      limit: document.getElementById('f-limit').value
    };
  }

  var lastResultData = null;

  function showResults(html, rawData) {
    lastResultData = rawData;
    var container = document.getElementById('result-container');
    container.innerHTML = '';
    if (typeof html === 'string') {
      container.innerHTML = html;
    } else {
      container.appendChild(html);
    }
    document.getElementById('audit-results').style.display = '';
  }

  function showResultInfo(text) {
    document.getElementById('result-info').textContent = text;
  }

  function showJsonResult(label, data) {
    var json = JSON.stringify(data, null, 2);
    showResults('<div class="pre-block">' + esc(json) + '</div>', json);
    showResultInfo(label);
  }

  function showError(msg) {
    showResults('<div style="color:var(--red);font-size:13px;padding:8px">' + esc(msg) + '</div>', msg);
    showResultInfo('Error');
  }

  /* ── Events Table ───────────────────────────────── */

  function renderEventsTable(events) {
    if (!events || !events.length) {
      showResults('<p style="color:var(--dim);font-size:13px;padding:8px">No events found.</p>', []);
      showResultInfo('0 events');
      return;
    }
    var frag = document.createDocumentFragment();
    var tbl = document.createElement('table');
    tbl.className = 'tbl';

    var thead = document.createElement('thead');
    var headerRow = document.createElement('tr');
    var cols = ['', 'Time', 'Actor', 'Action', 'Resource', 'Result'];
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.textContent = c;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    tbl.appendChild(thead);

    var tbody = document.createElement('tbody');
    events.forEach(function (ev, idx) {
      var tr = document.createElement('tr');
      tr.setAttribute('data-idx', idx);

      // Expand button
      var tdExp = document.createElement('td');
      var expBtn = document.createElement('button');
      expBtn.className = 'expand-btn';
      expBtn.textContent = '+';
      expBtn.addEventListener('click', function () {
        var detailId = 'detail-' + idx;
        var existing = document.getElementById(detailId);
        if (existing) {
          existing.remove();
          expBtn.textContent = '+';
          return;
        }
        expBtn.textContent = '\u2212';
        var detailTr = document.createElement('tr');
        detailTr.id = detailId;
        detailTr.className = 'detail-row';
        var detailTd = document.createElement('td');
        detailTd.colSpan = 6;
        var dl = document.createElement('dl');
        dl.className = 'detail-grid';
        var fields = [
          ['IP', ev.sourceIp || ev.source_ip || ''],
          ['User Agent', ev.userAgent || ev.user_agent || ''],
          ['Metadata', ev.metadata ? JSON.stringify(ev.metadata, null, 2) : ''],
          ['prevEventHash', ev.prevEventHash || ev.prev_event_hash || ''],
          ['eventHash', ev.eventHash || ev.event_hash || ''],
          ['chainVersion', ev.chainVersion || ev.chain_version || '']
        ];
        fields.forEach(function (pair) {
          var dt = document.createElement('dt');
          dt.textContent = pair[0];
          var dd = document.createElement('dd');
          dd.textContent = pair[1];
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        detailTd.appendChild(dl);
        detailTr.appendChild(detailTd);
        tr.after(detailTr);
      });
      tdExp.appendChild(expBtn);
      tr.appendChild(tdExp);

      // Time
      var tdTime = document.createElement('td');
      tdTime.textContent = ev.timestamp || ev.created_at || '';
      tr.appendChild(tdTime);

      // Actor
      var tdActor = document.createElement('td');
      var actorParts = [];
      if (ev.actorType || ev.actor_type) actorParts.push(ev.actorType || ev.actor_type);
      if (ev.actorId || ev.actor_id) actorParts.push(ev.actorId || ev.actor_id);
      tdActor.textContent = actorParts.join(': ');
      tr.appendChild(tdActor);

      // Action
      var tdAction = document.createElement('td');
      tdAction.textContent = ev.action || '';
      tr.appendChild(tdAction);

      // Resource
      var tdRes = document.createElement('td');
      var resParts = [];
      if (ev.resourceType || ev.resource_type) resParts.push(ev.resourceType || ev.resource_type);
      if (ev.resourceId || ev.resource_id) resParts.push(ev.resourceId || ev.resource_id);
      tdRes.textContent = resParts.join(': ');
      tr.appendChild(tdRes);

      // Result
      var tdResult = document.createElement('td');
      var resultVal = ev.result || '';
      tdResult.textContent = resultVal;
      if (resultVal === 'success') tdResult.style.color = 'var(--green)';
      else if (resultVal === 'failure' || resultVal === 'denied') tdResult.style.color = 'var(--red)';
      tr.appendChild(tdResult);

      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    frag.appendChild(tbl);

    var wrapper = document.createElement('div');
    wrapper.style.overflowX = 'auto';
    wrapper.appendChild(frag);
    showResults(wrapper, JSON.stringify(events, null, 2));
    showResultInfo(events.length + ' event' + (events.length !== 1 ? 's' : ''));
  }

  /* ── Audit Button Handlers ──────────────────────── */

  document.getElementById('btn-list-events').addEventListener('click', async function () {
    var filters = getFilters();
    try {
      var res = await api('GET', 'audit/events', filters);
      if (!res.ok) { showError('Error ' + res.status + ': ' + (typeof res.data === 'string' ? res.data : JSON.stringify(res.data))); return; }
      var events = Array.isArray(res.data) ? res.data : (res.data && res.data.data ? res.data.data : []);
      renderEventsTable(events);
    } catch (e) {
      showError('Request failed: ' + e.message);
    }
  });

  document.getElementById('btn-export').addEventListener('click', async function () {
    var filters = getFilters();
    try {
      var url = '/v1/audit/events/export';
      var params = new URLSearchParams();
      for (var k in filters) {
        if (filters[k] !== '' && filters[k] !== undefined && filters[k] !== null) params.set(k, String(filters[k]));
      }
      var qs = params.toString();
      if (qs) url += '?' + qs;
      var headers = {};
      if (token) headers['Authorization'] = 'Bearer ' + token;
      var resp = await fetch(url, { method: 'GET', headers: headers });
      if (!resp.ok) {
        showError('Export failed: HTTP ' + resp.status);
        return;
      }
      var text = await resp.text();
      var blob = new Blob([text], { type: safeMime('application/x-ndjson') });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'audit-events-' + new Date().toISOString().replace(/[:.]/g, '-') + '.ndjson';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      showResultInfo('Export downloaded');
    } catch (e) {
      showError('Export failed: ' + e.message);
    }
  });

  document.getElementById('btn-summary').addEventListener('click', async function () {
    var filters = getFilters();
    var top = document.getElementById('f-top').value;
    if (top) filters.top = top;
    try {
      var res = await api('GET', 'audit/events/summary', filters);
      if (!res.ok) { showError('Error ' + res.status); return; }
      showJsonResult('Summary', res.data);
    } catch (e) {
      showError('Request failed: ' + e.message);
    }
  });

  document.getElementById('btn-timeseries').addEventListener('click', async function () {
    var filters = getFilters();
    filters.bucket = document.getElementById('f-bucket').value;
    try {
      var res = await api('GET', 'audit/events/timeseries', filters);
      if (!res.ok) { showError('Error ' + res.status); return; }
      showJsonResult('Timeseries', res.data);
    } catch (e) {
      showError('Request failed: ' + e.message);
    }
  });

  document.getElementById('btn-kpis').addEventListener('click', async function () {
    var windowHours = document.getElementById('f-windowHours').value;
    var query = {};
    if (windowHours) query.windowHours = windowHours;
    try {
      var res = await api('GET', 'audit/events/kpis', query);
      if (!res.ok) { showError('Error ' + res.status); return; }
      showJsonResult('KPIs', res.data);
    } catch (e) {
      showError('Request failed: ' + e.message);
    }
  });

  /* ── Copy Results ───────────────────────────────── */

  document.getElementById('btn-copy-results').addEventListener('click', function () {
    if (!lastResultData) return;
    var text = typeof lastResultData === 'string' ? lastResultData : JSON.stringify(lastResultData, null, 2);
    navigator.clipboard.writeText(text).then(function () {
      var btn = document.getElementById('btn-copy-results');
      var orig = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(function () { btn.textContent = orig; }, 1500);
    }).catch(function () {});
  });

  /* ── Diagnostics ────────────────────────────────── */

  async function loadHealth() {
    var el = document.getElementById('health-content');
    el.innerHTML = '';
    var table = document.createElement('table');
    table.className = 'kv-table';

    var checks = [
      { label: 'Liveness', path: 'health/live' },
      { label: 'Readiness', path: 'health/ready' }
    ];

    for (var i = 0; i < checks.length; i++) {
      var check = checks[i];
      var tr = document.createElement('tr');
      var tdLabel = document.createElement('td');
      tdLabel.textContent = check.label;
      var tdStatus = document.createElement('td');
      try {
        var res = await api('GET', check.path);
        var dot = document.createElement('span');
        dot.className = 'status-dot ' + (res.ok ? 'ok' : 'err');
        tdStatus.appendChild(dot);
        var statusText = document.createTextNode(res.ok ? 'OK' : 'DOWN (HTTP ' + res.status + ')');
        tdStatus.appendChild(statusText);
      } catch (e) {
        var dot2 = document.createElement('span');
        dot2.className = 'status-dot err';
        tdStatus.appendChild(dot2);
        var errText = document.createTextNode('Unreachable');
        tdStatus.appendChild(errText);
      }
      tr.appendChild(tdLabel);
      tr.appendChild(tdStatus);
      table.appendChild(tr);
    }
    el.appendChild(table);
  }

  async function loadSysInfo() {
    var el = document.getElementById('sysinfo-content');
    el.innerHTML = '';
    try {
      var res = await api('GET', 'system/info');
      if (!res.ok) {
        el.textContent = 'Error: HTTP ' + res.status;
        return;
      }
      var data = res.data;
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch (e) { el.textContent = data; return; }
      }
      var table = document.createElement('table');
      table.className = 'kv-table';
      var keys = Object.keys(data);
      keys.forEach(function (key) {
        var tr = document.createElement('tr');
        var tdKey = document.createElement('td');
        tdKey.textContent = key;
        var tdVal = document.createElement('td');
        var val = data[key];
        tdVal.textContent = typeof val === 'object' ? JSON.stringify(val) : String(val);
        tr.appendChild(tdKey);
        tr.appendChild(tdVal);
        table.appendChild(tr);
      });
      el.appendChild(table);
    } catch (e) {
      el.textContent = 'Failed to load system info';
    }
  }

  async function loadMetrics() {
    var el = document.getElementById('metrics-content');
    el.innerHTML = '';
    try {
      var res = await api('GET', 'metrics');
      var pre = document.createElement('div');
      pre.className = 'pre-block';
      if (typeof res.data === 'string') {
        pre.textContent = res.data;
      } else {
        pre.textContent = JSON.stringify(res.data, null, 2);
      }
      el.appendChild(pre);
    } catch (e) {
      el.textContent = 'Failed to load metrics';
    }
  }

  function loadDiagnostics() {
    loadHealth();
    loadSysInfo();
    loadMetrics();
  }

  document.getElementById('btn-refresh-health').addEventListener('click', loadHealth);
  document.getElementById('btn-refresh-sysinfo').addEventListener('click', loadSysInfo);
  document.getElementById('btn-refresh-metrics').addEventListener('click', loadMetrics);

  /* ── Init ───────────────────────────────────────── */

  checkAdmin();

})();
</script>
</body>
</html>
